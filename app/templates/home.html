<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>XinRange - 信创渗透靶场</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: #fff;
        }
        .container { max-width: 960px; margin: 0 auto; padding: 60px 24px; }
        .hero { text-align: center; margin-bottom: 60px; }
        .logo {
            font-size: 56px;
            font-weight: 700;
            background: linear-gradient(90deg, #00c6ff, #0072ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 16px;
        }
        .tagline { font-size: 20px; color: #a0a0c0; margin-bottom: 8px; }
        .stack { font-size: 13px; color: #6a6a8a; margin-bottom: 32px; }
        .stack span {
            background: rgba(255,255,255,0.08);
            padding: 4px 12px;
            border-radius: 20px;
            margin: 4px;
            display: inline-block;
        }
        .modules { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; }
        .card {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            transition: transform 0.2s, border-color 0.2s;
            cursor: pointer;
        }
        .card:hover { transform: translateY(-4px); border-color: rgba(0,114,255,0.6); }
        .card-icon { font-size: 36px; margin-bottom: 12px; }
        .card-title { font-size: 16px; font-weight: 600; margin-bottom: 8px; }
        .card-desc { font-size: 13px; color: #8888aa; line-height: 1.5; }
        .card-level { margin-top: 12px; display: flex; gap: 6px; justify-content: center; }
        .level-dot { width: 8px; height: 8px; border-radius: 50%; }
        .level-dot.low { background: #378ADD; }
        .level-dot.medium { background: #EF9F27; }
        .level-dot.high { background: #E24B4A; }
        .tech-row { display: flex; justify-content: center; gap: 32px; margin-top: 48px; font-size: 13px; color: #6a6a8a; }
        .tech-row div { text-align: center; }
        .tech-row strong { display: block; color: #a0a0c0; font-size: 14px; margin-bottom: 4px; }
    </style>
</head>
<body>
<div class="container">
    <div class="hero">
        <div class="logo">XinRange</div>
        <p class="tagline">信创渗透学习靶场</p>
        <p class="stack">
            <span>银河麒麟 V10</span>
            <span>达梦 DM8</span>
            <span>OWASP Top 10</span>
        </p>
    </div>

    <div class="modules">
        <div class="card" onclick="location.href='/vulns/sqli/'">
            <div class="card-icon">💉</div>
            <div class="card-title">SQL 注入</div>
            <div class="card-desc">达梦方言注入<br>UNION / 报错 / 布尔盲注</div>
            <div class="card-level">
                <span class="level-dot low" title="Low"></span>
                <span class="level-dot medium" title="Medium"></span>
                <span class="level-dot high" title="High"></span>
            </div>
        </div>
        <div class="card" onclick="location.href='/vulns/xss/'">
            <div class="card-icon">⚡</div>
            <div class="card-title">XSS 跨站脚本</div>
            <div class="card-desc">存储型 / 反射型<br>多种绕过技巧</div>
            <div class="card-level">
                <span class="level-dot low" title="Low"></span>
                <span class="level-dot medium" title="Medium"></span>
                <span class="level-dot high" title="High"></span>
            </div>
        </div>
        <div class="card" onclick="location.href='/vulns/upload/'">
            <div class="card-icon">📤</div>
            <div class="card-title">文件上传</div>
            <div class="card-desc">白名单 / 黑名单绕过<br>webshell 上传</div>
            <div class="card-level">
                <span class="level-dot low" title="Low"></span>
                <span class="level-dot medium" title="Medium"></span>
                <span class="level-dot high" title="High"></span>
            </div>
        </div>
        <div class="card" onclick="location.href='/vulns/cmd/'">
            <div class="card-icon">🖥️</div>
            <div class="card-title">命令注入</div>
            <div class="card-desc">shell 注入利用<br>反弹 shell 技巧</div>
            <div class="card-level">
                <span class="level-dot low" title="Low"></span>
                <span class="level-dot medium" title="Medium"></span>
                <span class="level-dot high" title="High"></span>
            </div>
        </div>
    </div>

    <div class="tech-row">
        <div>
            <strong>操作系统</strong>
            银河麒麟 V10 SP2
        </div>
        <div>
            <strong>数据库</strong>
            达梦 DM8
        </div>
        <div>
            <strong>开发框架</strong>
            Django 4.x
        </div>
        <div>
            <strong>漏洞覆盖</strong>
            OWASP Top 10
        </div>
    </div>
</div>
</body>
</html>
